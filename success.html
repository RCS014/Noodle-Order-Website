<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ยืนยันออเดอร์</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Kanit',sans-serif}
</style>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow max-w-md w-full space-y-4">

<h2 class="text-xl font-bold text-green-600 text-center">
สั่งอาหารสำเร็จ 🎉
</h2>

<div id="orderSummary" class="space-y-2 text-sm"></div>

<div class="border-t pt-4 flex justify-between font-bold">
<span>รวมทั้งหมด</span>
<span id="total"></span>
</div>

<a href="menu.html" class="block text-center bg-orange-600 text-white p-2 rounded-lg mt-4">
กลับไปหน้าเมนู
</a>

</div>

<script>
const data=JSON.parse(localStorage.getItem("orderData"))||[];
const summary=document.getElementById("orderSummary");
let total=0;

data.forEach(item=>{
const sum=item.price*item.qty;
total+=sum;

summary.innerHTML+=`
<div class="border p-2 rounded">
โต๊ะ ${item.table}<br>
${item.name} (${item.spicy})<br>
จำนวน ${item.qty} = ${sum} บาท
</div>
`;
});

document.getElementById("total").innerText=total+" บาท";
</script>

</body>
</html>
