<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ป. ประทีป ก๋วยเตี๋ยวเรือ</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Kanit',sans-serif;background:#f8fafc}
.active{background:#ea580c;color:white;border-color:#ea580c}
</style>
</head>

<body class="text-gray-800">

<header class="bg-white shadow-sm border-b py-4 mb-6">
<div class="max-w-6xl mx-auto px-4 flex justify-center">
<h1 class="text-2xl font-bold text-orange-600">
ป. ประทีป ก๋วยเตี๋ยวเรือ
</h1>
</div>
</header>

<div class="max-w-6xl mx-auto px-4 flex flex-col lg:flex-row gap-8">

<!-- ฝั่งซ้าย -->
<div class="flex-1 space-y-8">

<h2 class="text-xl font-semibold">สั่งก๋วยเตี๋ยว</h2>

<!-- เลือกโต๊ะ -->
<div>
<label class="font-medium">เลือกโต๊ะ</label>
<select id="table" class="w-full mt-2 border rounded-lg p-2">
<option value="1">โต๊ะ 1</option>
<option value="2">โต๊ะ 2</option>
<option value="3">โต๊ะ 3</option>
<option value="4">โต๊ะ 4</option>
<option value="5">โต๊ะ 5</option>
</select>
</div>

<!-- เลือกเส้น -->
<div>
<h3 class="font-medium mb-2">เลือกเส้น</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="noodles">
<button class="border rounded-lg p-3" data-name="เส้นเล็ก">เส้นเล็ก</button>
<button class="border rounded-lg p-3" data-name="เส้นหมี่">เส้นหมี่</button>
<button class="border rounded-lg p-3" data-name="เส้นใหญ่">เส้นใหญ่</button>
<button class="border rounded-lg p-3" data-name="บะหมี่">บะหมี่</button>
<button class="border rounded-lg p-3" data-name="วุ้นเส้น">วุ้นเส้น</button>
</div>
</div>

<!-- เลือกน้ำ -->
<div>
<h3 class="font-medium mb-2">เลือกน้ำซุป</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="soups">
<button class="border rounded-lg p-3" data-name="น้ำตก">น้ำตก</button>
<button class="border rounded-lg p-3" data-name="น้ำใส">น้ำใส</button>
<button class="border rounded-lg p-3" data-name="แห้ง">แห้ง</button>
<button class="border rounded-lg p-3" data-name="ต้มยำ">ต้มยำ</button>
</div>
</div>

<!-- ขนาด -->
<div>
<h3 class="font-medium mb-2">เลือกขนาด</h3>
<select id="size" class="w-full border rounded-lg p-2">
<option value="20">ธรรมดา 20 บาท</option>
<option value="35">พิเศษ 35 บาท</option>
<option value="40">ใส่ถุง 40 บาท</option>
</select>
</div>

<!-- จำนวน -->
<div>
<h3 class="font-medium mb-2">จำนวน</h3>
<input type="number" id="qty" value="1" min="1" class="w-full border rounded-lg p-2">
</div>

<button onclick="addMainItem()" class="w-full bg-orange-600 hover:bg-orange-700 text-white p-3 rounded-xl font-semibold">
เพิ่มก๋วยเตี๋ยว
</button>

<hr>

<!-- เครื่องเคียง -->
<div>
<h3 class="font-semibold text-lg mb-3">เครื่องเคียง</h3>
<div id="sidesGrid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
</div>

</div>

<!-- ฝั่งขวา -->
<aside class="w-full lg:w-96">
<div class="bg-white shadow-lg rounded-2xl p-6 border sticky top-6">
<h3 class="text-xl font-semibold mb-4">สรุปออเดอร์</h3>
<p id="tableShow" class="text-sm text-gray-500 mb-2"></p>
<div id="orderList" class="space-y-2 text-sm"></div>

<div class="border-t mt-4 pt-4 flex justify-between">
<span>ราคารวม</span>
<span id="total" class="text-2xl font-bold text-orange-600">0 บาท</span>
</div>

<button class="w-full mt-6 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold">
ยืนยันออเดอร์
</button>
</div>
</aside>

</div>

<script>
let selectedNoodle=null;
let selectedSoup=null;
let total=0;

function singleSelect(groupId,callback){
const group=document.getElementById(groupId);
group.querySelectorAll("button").forEach(btn=>{
btn.addEventListener("click",()=>{
group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
callback(btn.dataset.name);
});
});
}

singleSelect("noodles",name=>selectedNoodle=name);
singleSelect("soups",name=>selectedSoup=name);

function addMainItem(){
if(!selectedNoodle||!selectedSoup){
alert("กรุณาเลือกเส้นและน้ำซุป");
return;
}
const size=parseInt(document.getElementById("size").value);
const qty=parseInt(document.getElementById("qty").value);
const table=document.getElementById("table").value;

const price=size*qty;
total+=price;

document.getElementById("tableShow").innerText="โต๊ะ "+table;

addToSummary(`${selectedNoodle} (${selectedSoup}) x${qty}`,price);
document.getElementById("qty").value=1;
}

const sides=[
{name:"กากหมู",price:20},
{name:"หมูลวก",price:60},
{name:"แคบหมู",price:10},
{name:"เนื้อลวก",price:60},
{name:"ลูกชิ้นลวก",price:20},
{name:"ตับลวก",price:60},
{name:"ผักบุ้ง",price:10},
{name:"ข้าวเปล่า",price:10},
{name:"ขนมถ้วย",price:12}
];

const sidesGrid=document.getElementById("sidesGrid");

sides.forEach(item=>{
const btn=document.createElement("button");
btn.className="border rounded-lg p-3 text-sm hover:bg-orange-50";
btn.innerHTML=`${item.name}<br><span class="text-xs text-gray-500">${item.price} บาท</span>`;
btn.onclick=()=>{
total+=item.price;
addToSummary(item.name,item.price);
};
sidesGrid.appendChild(btn);
});

function addToSummary(name,price){
const row=document.createElement("div");
row.className="flex justify-between border p-2 rounded";
row.innerHTML=`
<span>${name}</span>
<span>${price} บาท</span>
`;
document.getElementById("orderList").appendChild(row);
document.getElementById("total").innerText=total+" บาท";
}
</script>

</body>
</html>
