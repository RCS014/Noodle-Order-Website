<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ป. ประทีป ก๋วยเตี๋ยวเรือ</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Kanit',sans-serif}
.active{background:#ea580c;color:white;border-color:#ea580c}
</style>
</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-orange-50 pb-32">

<header class="bg-white shadow-md p-4 text-center sticky top-0 z-40">
<h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-orange-600">
🍜 ป. ประทีป ก๋วยเตี๋ยวเรือ
</h1>
</header>

<div id="toast" class="hidden fixed top-5 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-2 rounded-lg shadow-lg z-50"></div>

<button onclick="openCart()"
class="fixed bottom-5 right-5 sm:bottom-6 sm:right-6 bg-orange-600 hover:bg-orange-700 text-white px-4 sm:px-5 py-3 rounded-full shadow-xl z-50 transition text-sm sm:text-base">
🛒 <span id="cartCount">0</span>
</button>

<div class="max-w-6xl mx-auto px-4 sm:px-6 md:px-10 py-6 space-y-6">

<div id="statusNotice" class="hidden bg-yellow-100 border border-yellow-400 text-yellow-800 p-4 rounded-xl shadow"></div>

<div>
<label class="font-semibold text-sm sm:text-base">เลือกหมวดเมนู</label>
<select onchange="switchPage(this.value)" class="w-full border rounded-lg p-2 mt-2 shadow-sm">
<option value="noodle">🍜 สั่งก๋วยเตี๋ยว</option>
<option value="side">🥗 สั่งเครื่องเคียง</option>
</select>
</div>

<!-- ================= PAGE NOODLE ================= -->
<div id="noodlePage" class="space-y-6 bg-white p-4 sm:p-6 rounded-2xl shadow-md">

<div>
<label class="font-semibold">เลือกโต๊ะ</label>
<select id="table" onchange="checkOldStatus()" class="w-full border rounded-lg p-2 mt-2">
<option value="1">โต๊ะ 1</option>
<option value="2">โต๊ะ 2</option>
<option value="3">โต๊ะ 3</option>
<option value="4">โต๊ะ 4</option>
<option value="5">โต๊ะ 5</option>
</select>
</div>

<div>
<h3 class="font-semibold mb-2">เลือกเส้น</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="noodles">
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="เส้นเล็ก">เส้นเล็ก</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="เส้นหมี่">เส้นหมี่</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="เส้นใหญ่">เส้นใหญ่</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="บะหมี่">บะหมี่</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="วุ้นเส้น">วุ้นเส้น</button>
</div>
</div>

<div>
<h3 class="font-semibold mb-2">เลือกน้ำซุป</h3>
<div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="soups">
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="น้ำตก">น้ำตก</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="น้ำใส">น้ำใส</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="แห้ง">แห้ง</button>
<button class="border rounded-lg p-2 hover:bg-orange-100" data-name="ต้มยำ">ต้มยำ</button>
</div>
</div>

<!-- เพิ่มเลือกเนื้อ -->
<div>
<h3 class="font-semibold mb-2">เลือกเนื้อ (เลือกได้หลายตัว)</h3>
<div class="grid grid-cols-2 md:grid-cols-4 gap-2">
<label><input type="checkbox" class="meat" value="หมูสด"> หมูสด</label>
<label><input type="checkbox" class="meat" value="เนื้อสด"> เนื้อสด</label>
<label><input type="checkbox" class="meat" value="ตับ"> ตับ</label>
<label><input type="checkbox" class="meat" value="ลูกชิ้น"> ลูกชิ้น</label>
</div>
</div>

<!-- เพิ่มเลือกผัก -->
<div>
<h3 class="font-semibold mb-2">ผัก</h3>
<select id="vegetable" class="w-full border rounded-lg p-2">
<option value="ใส่ผัก">ใส่ผัก</option>
<option value="ไม่ใส่ผัก">ไม่ใส่ผัก</option>
</select>
</div>

<div class="grid sm:grid-cols-2 gap-4">
<div>
<h3 class="font-semibold mb-2">ระดับความเผ็ด</h3>
<select id="spicy" class="w-full border rounded-lg p-2">
<option>เผ็ดน้อย</option>
<option>เผ็ดกลาง</option>
<option>เผ็ดมาก</option>
</select>
</div>

<div>
<h3 class="font-semibold mb-2">ขนาด</h3>
<select id="size" class="w-full border rounded-lg p-2">
<option value="20">ธรรมดา 20 บาท</option>
<option value="35">พิเศษ 35 บาท</option>
<option value="40">ใส่ถุง 40 บาท</option>
</select>
</div>
</div>

<div>
<h3 class="font-semibold mb-2">จำนวน</h3>
<div class="flex items-center gap-3">
<button onclick="changeMainQty(-1)" class="bg-gray-200 w-10 h-10 rounded-lg">➖</button>
<input type="number" id="qty" value="1" min="1"
class="w-20 text-center border rounded-lg p-2">
<button onclick="changeMainQty(1)" class="bg-gray-200 w-10 h-10 rounded-lg">➕</button>
</div>
</div>

<button onclick="addNoodle()" class="w-full bg-orange-600 text-white p-3 rounded-xl font-semibold hover:bg-orange-700 transition">
เพิ่มรายการ
</button>

</div>

<!-- ================= PAGE SIDE ================= -->
<div id="sidePage" class="hidden space-y-6 bg-white p-4 sm:p-6 rounded-2xl shadow-md">

<h3 class="font-semibold text-lg">เลือกเครื่องเคียง</h3>
<div id="sideMenu" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

<button onclick="confirmSides()" class="w-full bg-orange-600 text-white p-3 rounded-xl font-semibold hover:bg-orange-700 transition">
เพิ่มเครื่องเคียงลงตะกร้า
</button>

</div>

</div>

<!-- ================= CART ================= -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
<div class="bg-white w-full max-w-md rounded-2xl p-6 space-y-4 shadow-2xl">

<h3 class="text-lg font-bold text-orange-600">สรุปรายการ</h3>

<div id="cartItems" class="space-y-2 text-sm max-h-64 overflow-y-auto"></div>

<div class="flex justify-between font-bold border-t pt-3">
<span>รวมทั้งหมด</span>
<span id="totalPrice">0 บาท</span>
</div>

<div class="flex gap-2">
<button onclick="clearCart()" class="flex-1 border rounded-lg p-2 text-red-500">ล้าง</button>
<button onclick="closeCart()" class="flex-1 border rounded-lg p-2">ปิด</button>
<button onclick="confirmOrder()" class="flex-1 bg-orange-600 text-white rounded-lg p-2">ยืนยัน</button>
</div>

</div>
</div>

<script>
let selectedNoodle=null;
let selectedSoup=null;
let cart=[];
let orderHistory = JSON.parse(localStorage.getItem("orderHistory")) || [];

// ดึงรายการที่วัตถุดิบหมด มาจากหน้า Admin
let disabledItems = JSON.parse(localStorage.getItem('disabledMenuItems')) || [];

/* ===== ระบบเครื่องเคียง ===== */
const sides=[
    {name:"ผักบุ้งลวก",price:10},
    {name:"กากหมู",price:20},
    {name:"หมูลวก",price:60},
    {name:"แคปหมู",price:20},
    {name:"เนื้อลวก",price:60},
    {name:"ลูกชิ้นลวก",price:20},
    {name:"ตับลวก",price:60},
    {name:"ข้าวเปล่า",price:10},
    {name:"ขนมถ้วย (คู่)",price:12}
];

const sideContainer=document.getElementById("sideMenu");

sides.forEach((item,i)=>{
    // เช็คว่าเมนูนี้อยู่ในลิสต์ของหมดไหม
    let isOut = disabledItems.includes(item.name);
    
    sideContainer.innerHTML+=`
    <div class="border p-4 rounded-xl shadow-sm space-y-3 ${isOut ? 'bg-gray-100 opacity-60 grayscale' : 'bg-white'}">
        <div class="flex items-center gap-2">
            <input type="checkbox" id="side${i}" ${isOut ? 'disabled' : ''}>
            <label for="side${i}" class="font-medium ${isOut ? 'line-through text-gray-500' : ''}">
                ${item.name} (${item.price} บาท) ${isOut ? '<span class="text-red-500 text-sm ml-1">(หมด)</span>' : ''}
            </label>
        </div>
        <div class="flex items-center gap-2 pl-6">
            <button onclick="changeSideQty(${i},-1)" class="bg-gray-200 w-9 h-9 rounded-lg" ${isOut ? 'disabled' : ''}>➖</button>
            <input type="number" id="qty${i}" value="1" min="1" class="w-16 text-center border rounded p-1" ${isOut ? 'disabled' : ''}>
            <button onclick="changeSideQty(${i},1)" class="bg-gray-200 w-9 h-9 rounded-lg" ${isOut ? 'disabled' : ''}>➕</button>
        </div>
    </div>`;
});

function showToast(msg){
    const t=document.getElementById("toast");
    t.innerText=msg;
    t.classList.remove("hidden");
    setTimeout(()=>t.classList.add("hidden"),1500);
}

function switchPage(p){
    document.getElementById("noodlePage").classList.toggle("hidden",p!=="noodle");
    document.getElementById("sidePage").classList.toggle("hidden",p!=="side");
}

/* แก้ไขให้คลิกปุ่มที่โดนล็อก (ของหมด) ไม่ได้ */
function singleSelect(id,cb){
    document.getElementById(id).querySelectorAll("button").forEach(btn=>{
        btn.onclick=()=>{
            // เช็คว่าถ้ามี attribute disabled ห้ามทำงานต่อเด็ดขาด
            if(btn.hasAttribute('disabled')) return; 

            document.getElementById(id).querySelectorAll("button").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            cb(btn.dataset.name);
        };
    });
}
singleSelect("noodles",n=>selectedNoodle=n);
singleSelect("soups",s=>selectedSoup=s);

function changeMainQty(x){
    let q=document.getElementById("qty");
    let val=parseInt(q.value)+x;
    if(val<1) val=1;
    q.value=val;
}

function changeSideQty(i,x){
    let q=document.getElementById("qty"+i);
    let val=parseInt(q.value)+x;
    if(val<1) val=1;
    q.value=val;
}

function addNoodle(){
    if(!selectedNoodle||!selectedSoup){
        showToast("กรุณาเลือกเส้นและน้ำซุป");
        return;
    }

    let meats=[...document.querySelectorAll(".meat:checked")].map(m=>m.value);
    let meatText=meats.length?meats.join(", "):"ไม่เลือกเนื้อ";
    let veg=document.getElementById("vegetable").value;

    let sizeSelect=document.getElementById("size");
    let sizeText=sizeSelect.options[sizeSelect.selectedIndex].text;

    let qty=parseInt(document.getElementById("qty").value);

    let newItem={
        table:document.getElementById("table").value,
        name:selectedNoodle+" "+selectedSoup+" ("+meatText+", "+veg+")",
        spicy:document.getElementById("spicy").value,
        price:parseInt(sizeSelect.value),
        sizeName:sizeText,
        qty:qty,
        status:"กำลังทำ"
    };

    mergeItem(newItem);
    document.getElementById("qty").value=1;
    document.querySelectorAll(".meat").forEach(m=>m.checked=false);
    showToast("เพิ่มรายการแล้ว");
}

function confirmSides(){
    sides.forEach((item,i)=>{
        let check=document.getElementById("side"+i);
        if(check && check.checked){
            let qty=parseInt(document.getElementById("qty"+i).value);
            mergeItem({
                table:document.getElementById("table").value,
                name:item.name,
                price:item.price,
                qty:qty,
                status:"กำลังทำ"
            });
            check.checked=false;
            document.getElementById("qty"+i).value=1;
        }
    });
    showToast("เพิ่มเครื่องเคียงแล้ว");
}

function mergeItem(newItem){
    let existing=cart.find(i=>
        i.name===newItem.name &&
        i.price===newItem.price &&
        i.table===newItem.table
    );
    if(existing){
        existing.qty+=newItem.qty;
    }else{
        cart.push(newItem);
    }
    updateCart();
}

function updateCart(){
    let c=0;
    cart.forEach(i=>c+=i.qty);
    document.getElementById("cartCount").innerText=c;
}

function openCart(){
    renderCart();
    document.getElementById("cartModal").classList.remove("hidden");
}

function closeCart(){
    document.getElementById("cartModal").classList.add("hidden");
}

function renderCart(){
    let total=0;
    const box=document.getElementById("cartItems");
    box.innerHTML="";
    cart.forEach((i,idx)=>{
        let sum=i.price*i.qty; total+=sum;
        box.innerHTML+=`
        <div class="border p-2 rounded flex justify-between">
            <div>
            โต๊ะ ${i.table}<br>
            ${i.name}<br>
            ${i.spicy ? "🌶 "+i.spicy+"<br>" : ""}
            ${i.sizeName ? i.sizeName+" * "+i.qty : i.price+" x "+i.qty}<br>
            </div>
            <div>
            ${sum} บาท
            <button onclick="removeItem(${idx})" class="text-red-500 ml-2">ลบ</button>
            </div>
        </div>`;
    });
    document.getElementById("totalPrice").innerText=total+" บาท";
}

function removeItem(i){
    cart.splice(i,1);
    updateCart();
    renderCart();
    showToast("ลบแล้ว");
}

function clearCart(){
    cart=[];
    updateCart();
    renderCart();
    showToast("ลบทั้งหมดแล้ว");
}

function confirmOrder(){
    if(cart.length===0){
        showToast("ยังไม่มีรายการ");
        return;
    }

    // 👉 เพิ่มบรรทัดนี้: ให้ดึงประวัติ "ล่าสุด" จากระบบเสมอก่อนบันทึก
    let latestHistory = JSON.parse(localStorage.getItem("orderHistory")) || [];

    let queueNumber = Date.now();
    cart.forEach(i=>{
        i.queue=queueNumber;
        i.status="กำลังทำ";
    });

    // เอาตะกร้าปัจจุบัน ไปต่อท้ายประวัติล่าสุด
    latestHistory = latestHistory.concat(cart);

    localStorage.setItem("orderHistory",JSON.stringify(orderHistory));
    localStorage.setItem("currentTable",document.getElementById("table").value);
    localStorage.setItem("selectedStatusTable",document.getElementById("table").value);

    cart=[];
    updateCart();
    closeCart();
    showToast("ส่งออเดอร์เรียบร้อย");
    setTimeout(()=>window.location.href="status.html",800);
}

function checkOldStatus(){
    let table=document.getElementById("table").value;
    localStorage.setItem("selectedStatusTable", table);
    let box=document.getElementById("statusNotice");
    let oldOrders=orderHistory.filter(o=>o.table===table);

    box.classList.remove("hidden");
    if(oldOrders.length===0){
        box.innerHTML="❌ โต๊ะนี้ยังไม่มีรายการที่สั่ง กรุณาสั่งอาหาร";
    }else{
        box.innerHTML=`
        📋 โต๊ะนี้มีรายการเดิมอยู่
        <button onclick="window.location.href='status.html'" class="ml-2 bg-orange-600 text-white px-3 py-1 rounded-lg text-sm">ดูสถานะ</button>`;
    }
}

// ===============================================
// ฟังก์ชันล็อก(Disable) เมนูวัตถุดิบที่หมด บนหน้าจอ
// ===============================================
function lockDisabledMenu() {
    // 1. ล็อก เส้น และ น้ำซุป
    document.querySelectorAll('#noodles button, #soups button').forEach(btn => {
        let itemName = btn.dataset.name;
        if (disabledItems.includes(itemName)) {
            btn.setAttribute('disabled', 'true');
            btn.classList.add('opacity-50', 'bg-gray-100', 'text-gray-400', 'line-through', 'cursor-not-allowed');
            btn.classList.remove('hover:bg-orange-100');
        }
    });

    // 2. ล็อก เนื้อสัตว์ต่างๆ
    document.querySelectorAll('.meat').forEach(checkbox => {
        let itemName = checkbox.value;
        if (disabledItems.includes(itemName)) {
            checkbox.disabled = true;
            let label = checkbox.parentElement;
            label.classList.add('opacity-50', 'text-gray-400', 'line-through', 'cursor-not-allowed');
        }
    });
}

// สั่งให้เช็ครายการที่ล็อกตอนเปิดหน้าเว็บ
window.onload = function() {
    checkOldStatus();
    lockDisabledMenu();
};

</script>

</body>
</html>
