<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าแม่ค้า (Admin)</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Kanit',sans-serif}
</style>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<h1 class="text-3xl font-bold text-orange-600 mb-6 text-center">
👩‍🍳 หน้าควบคุมร้าน
</h1>

<div id="orderContainer" class="space-y-4 max-w-4xl mx-auto"></div>

<script>

function getOrders(){
return JSON.parse(localStorage.getItem("orderHistory")) || [];
}

function saveOrders(data){
localStorage.setItem("orderHistory", JSON.stringify(data));
}

function groupByTable(orders){
let grouped={};
orders.forEach(o=>{
if(!grouped[o.table]) grouped[o.table]=[];
grouped[o.table].push(o);
});
return grouped;
}

function renderAdmin(){
let container=document.getElementById("orderContainer");
container.innerHTML="";

let orders=getOrders();

if(orders.length===0){
container.innerHTML="<div class='text-center text-gray-500'>ไม่มีออเดอร์</div>";
return;
}

let grouped=groupByTable(orders);

for(let table in grouped){

let tableBox=document.createElement("div");
tableBox.className="bg-white p-4 rounded-xl shadow";

let itemsHTML="";
grouped[table].forEach((item,index)=>{
itemsHTML+=`
<div class="border p-2 rounded mb-2">
${item.name} x ${item.qty}<br>
${item.spicy ? "🌶 "+item.spicy+"<br>" : ""}
สถานะ: <span class="font-semibold">${item.status}</span>
</div>`;
});

tableBox.innerHTML=`
<h2 class="font-bold text-lg text-orange-600 mb-3">โต๊ะ ${table}</h2>

${itemsHTML}

<div class="flex gap-2 mt-3">
<button onclick="markReady('${table}')"
class="flex-1 bg-green-500 hover:bg-green-600 text-white p-2 rounded">
ทำเสร็จแล้ว
</button>

<button onclick="deleteTable('${table}')"
class="flex-1 bg-red-500 hover:bg-red-600 text-white p-2 rounded">
ลบออเดอร์โต๊ะนี้
</button>
</div>
`;

container.appendChild(tableBox);
}
}

function markReady(table){
let orders=getOrders();

orders.forEach(o=>{
if(o.table===table){
o.status="พร้อมเสิร์ฟ";
}
});

saveOrders(orders);
renderAdmin();
}

function deleteTable(table){
let orders=getOrders();

orders=orders.filter(o=>o.table!==table);

saveOrders(orders);
renderAdmin();
}

renderAdmin();
setInterval(renderAdmin,3000);

</script>

</body>
</html>
