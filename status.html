<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถานะคำสั่งซื้อ</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Kanit';
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f3ede6;

    /* ลายพื้นหลัง */
    background-image: 
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px),
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px);
    background-size: 80px 80px;
    background-position: 0 0, 40px 40px;
}
</style>

</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-orange-50 min-h-screen flex flex-col items-center p-6 py-12">

    <div class="flex items-center gap-3 mb-6">
        <span class="text-4xl">🍜</span>
        <h1 class="text-2xl md:text-3xl font-black text-orange-600">
            สถานะออเดอร์
        </h1>
    </div>

    <div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md text-center space-y-4">

        <div id="tableDisplayHeader" class="text-lg font-bold text-slate-800">
            โต๊ะที่สั่ง: <span id="showTable" class="text-orange-600"></span>
        </div>

        <div id="statusBox" class="mt-4 text-xl font-semibold text-yellow-600 animate-pulse">
            กำลังโหลดสถานะ...
        </div>

        <div id="queueBox" class="text-base font-bold text-gray-500 mt-2"></div>

        <div id="mainOrderList" class="mt-6 space-y-3 text-left">
            </div>

        <div id="totalPriceBox" class="border-t border-slate-200 pt-4 mt-4 text-right font-black text-xl text-orange-600 hidden">
            ราคารวมทั้งหมด: 0 บาท
        </div>

        <button onclick="goBackToMenu()" class="mt-6 bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-3 rounded-xl w-full transition-colors active:scale-95">
            กลับไปสั่งอีกครั้ง
        </button>

    </div>

    <audio id="notifySound">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
    </audio>

<script>
const urlParams = new URLSearchParams(window.location.search);
let table = urlParams.get('table') || localStorage.getItem("selectedStatusTable") || localStorage.getItem("currentTable");
let notified = false;

// อัปเดตความจำเครื่องให้เป็นโต๊ะปัจจุบันเสมอ
if(table) {
    localStorage.setItem("selectedStatusTable", table);
    localStorage.setItem("currentTable", table);
}

if(table === "หน้าเคาน์เตอร์") {
    document.getElementById("tableDisplayHeader").innerHTML = `สั่งที่: <span class="text-orange-600">หน้าเคาน์เตอร์</span>`;
} else {
    document.getElementById("tableDisplayHeader").innerHTML = `โต๊ะที่สั่ง: <span class="text-orange-600">${table}</span>`;
}

function getOrders(){
    return JSON.parse(localStorage.getItem("currentOrders")) || [];
}

function getMyOrders(){
    let orders = getOrders();
    return orders.filter(o => o.table === table);
}

function updateStatus(){
    let orders = getOrders();
    let myOrders = getMyOrders();
    let statusBox = document.getElementById("statusBox");
    let queueBox = document.getElementById("queueBox");

    if(myOrders.length === 0){
        statusBox.innerHTML = "ยังไม่มีรายการที่สั่ง";
        queueBox.innerHTML = "";
        document.getElementById("mainOrderList").innerHTML = "";
        document.getElementById("totalPriceBox").classList.add("hidden");
        return;
    }

    // 🛡️ ระบบป้องกันบั๊ก 1.7 ล้านล้าน: ดึงออเดอร์ล่าสุดจากเวลา (time)
    let latestTime = Math.max(...myOrders.map(o => o.time || o.queue));
    let currentOrders = myOrders.filter(o => (o.time || o.queue) === latestTime);

    let mainStatus = "พร้อมเสิร์ฟ";
    if(currentOrders.some(i => i.status === "รอคิว")){
        mainStatus = "รอคิว";
    } else if(currentOrders.some(i => i.status === "กำลังทำ")){
        mainStatus = "กำลังทำ";
    }

    // --- อัปเดตข้อความสถานะด้านบน ---
    if(mainStatus === "กำลังทำ"){
        statusBox.innerHTML = "🔥 กำลังจัดเตรียมรายการ...";
        statusBox.className = "text-xl font-bold text-orange-500 animate-pulse";
        queueBox.innerHTML = "";
        notified = false;
    } else if(mainStatus === "พร้อมเสิร์ฟ"){
        statusBox.innerHTML = "✅ พร้อมเสิร์ฟแล้ว";
        statusBox.className = "text-xl font-bold text-green-600";
        queueBox.innerHTML = "";
        if(!notified){
            document.getElementById("notifySound").play();
            notified = true;
        }
    } else {
        statusBox.innerHTML = "⏳ กรุณารอคิว...";
        statusBox.className = "text-xl font-bold text-yellow-500 animate-pulse";
        notified = false;
        
        // คำนวณคิวจริง
        let waitingTimes = [...new Set(orders.filter(o => o.status === "รอคิว").map(o => o.time || o.queue))].sort((a,b) => a-b);
        let myIndex = waitingTimes.indexOf(latestTime);
        
        if(myIndex > 0){
            queueBox.innerHTML = `เหลืออีก <span class="text-orange-600">${myIndex}</span> คิวก่อนถึงคุณ`;
        } else {
            queueBox.innerHTML = "";
        }
    }

    // --- วาดรายการอาหารลงหน้าหลัก ---
    renderOrderList(currentOrders);
}

function renderOrderList(ordersToRender) {
    let box = document.getElementById("mainOrderList");
    let priceBox = document.getElementById("totalPriceBox");
    box.innerHTML = "";
    let totalPrice = 0;

    ordersToRender.forEach(o => {
        let menuName = o.menu || o.name || o.item || "ไม่พบชื่อเมนู";
        let size = o.sizeName ? o.sizeName.split(" ")[0] + " " + o.price + " บาท" : o.price + " บาท"; // ดึงเฉพาะคำว่า ธรรมดา/พิเศษ มาต่อท้ายด้วยราคา
        let spicy = o.spicyName || o.spicy || "ไม่เผ็ด";
        let qty = o.qty || 1;
        let price = o.price || 0;
        
        let sum = price * qty;
        totalPrice += sum;

        let statusColor = "text-yellow-500";
        if(o.status === "กำลังทำ") statusColor = "text-orange-500";
        if(o.status === "เสร็จแล้ว" || o.status === "พร้อมเสิร์ฟ") statusColor = "text-green-600";

        box.innerHTML += `
        <div class="border border-slate-200 rounded-xl p-4 bg-white shadow-sm">
            <div class="font-black text-slate-800 text-lg leading-tight mb-2">${menuName}</div>
            <div class="text-sm text-slate-500 font-medium space-y-1">
                <div>ขนาด: <span class="text-slate-700">${size}</span></div>
                <div>ระดับความเผ็ด: <span class="text-slate-700">${spicy}</span></div>
                <div>จำนวน: <span class="text-slate-700">${qty}</span></div>
            </div>
            <div class="text-orange-600 font-bold mt-2">
                รวม: ${sum} บาท
            </div>
            <div class="text-sm mt-2 pt-2 border-t border-slate-100 flex items-center gap-1">
                <span class="text-slate-500 font-medium">สถานะ:</span>
                <span class="${statusColor} font-black">${o.status}</span>
            </div>
        </div>
        `;
    });

    // อัปเดตราคารวม
    if(totalPrice > 0) {
        priceBox.innerHTML = `ราคารวมทั้งหมด: <span class="text-2xl">${totalPrice}</span> บาท`;
        priceBox.classList.remove("hidden");
    } else {
        priceBox.classList.add("hidden");
    }
}

setInterval(updateStatus, 2000);
updateStatus();

function goBackToMenu(){
    // 👉 ห้อยเลขโต๊ะ (พารามิเตอร์ ?table=...) กลับไปที่หน้าเมนูด้วย
    window.location.href = "menu.html?table=" + table;
}
</script>

</body>
</html>
