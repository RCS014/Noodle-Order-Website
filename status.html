<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถานะคำสั่งซื้อ</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Kanit',sans-serif}
</style>
</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-orange-50 min-h-screen flex flex-col items-center p-6">

<h1 class="text-2xl md:text-3xl font-bold text-orange-600 mb-6">
🍜 กำลังเตรียมอาหาร
</h1>

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md text-center space-y-4">

<div class="text-lg">
โต๊ะที่สั่ง:
<span id="showTable" class="font-bold text-orange-600"></span>
</div>

<div class="text-lg">
หมายเลขคิว:
<span id="queueNumber" class="font-bold text-green-600 text-2xl"></span>
</div>

<div id="statusBox" class="mt-4 text-xl font-semibold text-yellow-600 animate-pulse">
กำลังรอคิว...
</div>

<button onclick="openStatusModal()" 
class="mt-4 bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg w-full">
ดูสถานะของโต๊ะนี้
</button>

<button onclick="goBackToMenu()" 
class="mt-2 bg-gray-200 hover:bg-gray-300 text-black px-4 py-2 rounded-lg w-full">
กลับไปสั่งอีกครั้ง
</button>

</div>

<div id="statusModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
<div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4">

<h3 class="text-lg font-bold text-orange-600">รายการโต๊ะนี้</h3>

<div id="tableOrders" class="space-y-2 text-sm max-h-60 overflow-y-auto"></div>

<button onclick="closeStatusModal()" 
class="w-full border rounded-lg p-2">
ปิด
</button>

</div>
</div>

<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
let table = localStorage.getItem("selectedStatusTable") || localStorage.getItem("currentTable");
let orderHistory = JSON.parse(localStorage.getItem("currentOrders")) || [];
let notified = false;

if(!table){
    window.location.href="index.html";
}

document.getElementById("showTable").innerText = table;

function getMyOrders(){
    orderHistory = JSON.parse(localStorage.getItem("currentOrders")) || [];
    return orderHistory.filter(o => o.table === table);
}

function updateStatus(){
    let myOrders = getMyOrders();

    if(myOrders.length === 0){
        document.getElementById("statusBox").innerHTML = "ยังไม่มีรายการที่สั่ง กรุณาสั่งอาหาร";
        document.getElementById("queueNumber").innerText = "-";
        return;
    }

    let latestQueue = Math.max(...myOrders.map(o => o.queue));
    let currentOrders = myOrders.filter(o => o.queue === latestQueue);

    let myQueue = currentOrders[0].queue;
    document.getElementById("queueNumber").innerText = myQueue;

    // 👉 เช็คสถานะหลักของบิลแบบเดียวกับหน้าแอดมิน
    let mainStatus = "พร้อมเสิร์ฟ";
    if (currentOrders.some(i => i.status === "รอคิว")) {
        mainStatus = "รอคิว";
    } else if (currentOrders.some(i => i.status === "กำลังทำ")) {
        mainStatus = "กำลังทำ";
    }

    let statusBox = document.getElementById("statusBox");

    // 👉 อัปเดตข้อความและสีตาม 3 สถานะ
    if (mainStatus === "พร้อมเสิร์ฟ") {
        statusBox.innerHTML = "✅ พร้อมเสิร์ฟแล้ว";
        statusBox.className = "mt-4 text-xl font-bold text-green-600"; // เลิกกระพริบ เปลี่ยนเป็นสีเขียว
        
        if(!notified){
            document.getElementById("notifySound").play();
            notified = true;
        }
    } else if (mainStatus === "กำลังทำ") {
        statusBox.innerHTML = "🔥 กำลังทำอาหาร...";
        statusBox.className = "mt-4 text-xl font-bold text-orange-500 animate-pulse"; // สีส้ม กระพริบ
        notified = false; // รีเซ็ตเสียงเตือนเผื่อมีการสั่งเพิ่ม
    } else {
        statusBox.innerHTML = "⏳ กำลังรอคิว...";
        statusBox.className = "mt-4 text-xl font-bold text-yellow-600 animate-pulse"; // สีเหลือง กระพริบ
        notified = false;
    }
}

updateStatus();
setInterval(updateStatus, 3000);

function openStatusModal(){
    loadTableOrders();
    document.getElementById("statusModal").classList.remove("hidden");
}

function closeStatusModal(){
    document.getElementById("statusModal").classList.add("hidden");
}

function loadTableOrders(){
    let box = document.getElementById("tableOrders");
    box.innerHTML = "";
    let myOrders = getMyOrders();

    if(myOrders.length === 0){
        box.innerHTML = "ยังไม่มีรายการที่สั่ง กรุณาสั่งอาหาร";
        return;
    }

    myOrders.forEach(i => {
        // 👉 ใส่สีให้สถานะรายชิ้นในป็อปอัปด้วย
        let statusColor = "text-yellow-600";
        if(i.status === "กำลังทำ") statusColor = "text-orange-500";
        if(i.status === "พร้อมเสิร์ฟ") statusColor = "text-green-600";

        box.innerHTML += `
        <div class="border p-3 rounded-xl mb-2 bg-slate-50">
            <div class="font-semibold text-gray-800">${i.name} <span class="text-orange-600 ml-1">x ${i.qty}</span></div>
            ${i.spicy ? `<div class="text-sm text-gray-500">🌶 ${i.spicy}</div>` : ""}
            <div class="mt-1 text-sm">
                สถานะ: <span class="font-bold ${statusColor}">${i.status}</span>
            </div>
        </div>`;
    });
}

function goBackToMenu(){
    window.location.href="menu.html";
}
</script>

<script src="navbar-script.js" defer></script>

</body>
</html>
