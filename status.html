<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถานะคำสั่งซื้อ</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family: 'Kanit';
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f3ede6;

    /* ลายพื้นหลัง */
    background-image: 
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px),
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px);
    background-size: 80px 80px;
    background-position: 0 0, 40px 40px;
}


</style>

</head>

<body class="bg-gradient-to-br from-orange-50 via-white to-orange-50 min-h-screen flex flex-col items-center p-6">

<h1 class="text-2xl md:text-3xl font-bold text-orange-600 mb-6">
🍜 สถานะออเดอร์
</h1>

<div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md text-center space-y-4">

<div class="text-lg">
โต๊ะที่สั่ง:
<span id="showTable" class="font-bold text-orange-600"></span>
</div>

<div id="statusBox"
class="mt-4 text-xl font-semibold text-yellow-600 animate-pulse">
กำลังโหลดสถานะ...
</div>

<div id="queueBox"
class="text-lg font-bold text-gray-700">
</div>

<button onclick="openStatusModal()" 
class="mt-4 bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-lg w-full">
ดูรายการโต๊ะนี้
</button>

<button onclick="goBackToMenu()" 
class="mt-2 bg-gray-200 hover:bg-gray-300 text-black px-4 py-2 rounded-lg w-full">
กลับไปสั่งอีกครั้ง
</button>

</div>


<div id="statusModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
<div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl space-y-4">

<h3 class="text-lg font-bold text-orange-600">รายการโต๊ะนี้</h3>

<div id="tableOrders" class="space-y-2 text-sm max-h-60 overflow-y-auto"></div>

<button onclick="closeStatusModal()" 
class="w-full border rounded-lg p-2">
ปิด
</button>

</div>
</div>


<audio id="notifySound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>


<script>
let table = localStorage.getItem("selectedStatusTable") || localStorage.getItem("currentTable");
let orderHistory = JSON.parse(localStorage.getItem("currentOrders")) || [];
let notified = false;

if(!table){
    window.location.href="index.html";
}

document.getElementById("showTable").innerText = table;

function getOrders(){
    return JSON.parse(localStorage.getItem("currentOrders")) || [];
}

function getMyOrders(){
    let orders = getOrders();
    return orders.filter(o => o.table === table);
}

function updateStatus(){
    let orders = getOrders();
    let myOrders = getMyOrders();

    if(myOrders.length === 0){
        document.getElementById("statusBox").innerHTML = "ยังไม่มีรายการที่สั่ง";
        document.getElementById("queueBox").innerHTML = "";
        return;
    }

    // 🛡️ ระบบป้องกันบั๊ก 1.7 ล้านล้าน: ดึงออเดอร์ล่าสุดจากเวลา (time)
    let latestTime = Math.max(...myOrders.map(o => o.time || o.queue));
    let currentOrders = myOrders.filter(o => (o.time || o.queue) === latestTime);

    let myQueue = currentOrders[0].queue; // ดึงหมายเลขคิวมาโชว์
    
    let mainStatus = "พร้อมเสิร์ฟ";
    if(currentOrders.some(i => i.status === "รอคิว")){
        mainStatus = "รอคิว";
    } else if(currentOrders.some(i => i.status === "กำลังทำ")){
        mainStatus = "กำลังทำ";
    }

    let statusBox = document.getElementById("statusBox");
    let queueBox = document.getElementById("queueBox");

    // 🌟 นำการแสดงผล "หมายเลขคิว" กลับมา
    queueBox.innerHTML = `หมายเลขคิว: <span class="text-green-600 text-2xl">${myQueue}</span>`;

    if(mainStatus === "กำลังทำ"){
        statusBox.innerHTML = "🔥 กำลังเตรียมอาหาร...";
        statusBox.className = "mt-4 text-xl font-bold text-orange-500 animate-pulse";
        notified = false;
        return;
    }

    if(mainStatus === "พร้อมเสิร์ฟ"){
        statusBox.innerHTML = "✅ พร้อมเสิร์ฟแล้ว";
        statusBox.className = "mt-4 text-xl font-bold text-green-600";
        // ป้องกันเสียงดังวนลูปซ้ำๆ
        if(!notified){
            document.getElementById("notifySound").play();
            notified = true;
        }
        return;
    }

    // กรณีสถานะ = รอคิว
    statusBox.innerHTML = "⏳ กรุณารอคิวสักครู่...";
    statusBox.className = "mt-4 text-xl font-bold text-yellow-600 animate-pulse";
    notified = false;

    // 💡 ฟีเจอร์ของเพื่อน: คำนวณว่า "เหลืออีกกี่คิว" (ปรับปรุงให้ไม่บั๊กแล้ว)
    let waitingTimes = [...new Set(orders.filter(o => o.status === "รอคิว").map(o => o.time || o.queue))].sort((a,b) => a-b);
    let myIndex = waitingTimes.indexOf(latestTime);
    
    if(myIndex > 0){
        // ถ้ามีคิวก่อนหน้า ให้แสดงข้อความบอก
        statusBox.innerHTML += `<div class="text-sm font-medium text-gray-500 mt-2">เหลืออีก ${myIndex} คิวก่อนถึงคุณ</div>`;
    }
}

setInterval(updateStatus, 2000);
updateStatus();

function openStatusModal(){
    loadTableOrders();
    document.getElementById("statusModal").classList.remove("hidden");
}

function closeStatusModal(){
    document.getElementById("statusModal").classList.add("hidden");
}

function loadTableOrders(){
    let box = document.getElementById("tableOrders");
    box.innerHTML = "";
    let myOrders = getMyOrders();

    if(myOrders.length === 0){
        box.innerHTML = "ไม่มีรายการ";
        return;
    }

    // ดึงเฉพาะบิลล่าสุดมาโชว์ในป็อปอัป
    let latestTime = Math.max(...myOrders.map(o => o.time || o.queue));
    let currentOrders = myOrders.filter(o => (o.time || o.queue) === latestTime);

    currentOrders.forEach(o => {
        let statusColor = "text-yellow-600";
        if(o.status === "กำลังทำ") statusColor = "text-orange-500";
        if(o.status === "พร้อมเสิร์ฟ") statusColor = "text-green-600";

        // 🌟 ดึงข้อมูล ธรรมดา/พิเศษ และ ความเผ็ด กลับมา
        let sizeText = o.sizeName ? `<span class="text-black-600 font-bold">${o.sizeName}</span>` : "";
        let spicyText = o.spicy ? `<span class="text-rose-500 font-bold ml-1">🌶 ${o.spicy}</span>` : "";

        box.innerHTML += `
        <div class="border p-3 rounded-xl mb-2 bg-slate-50 flex justify-between items-center">
            <div>
                <div class="font-semibold text-gray-800">${o.name} <span class="text-orange-600 ml-1">x ${o.qty}</span></div>
                <div class="text-xs mt-1">${sizeText} ${spicyText}</div>
            </div>
            <div class="text-xs text-right">
                <span class="text-gray-500">สถานะ:</span><br>
                <span class="font-bold ${statusColor}">${o.status}</span>
            </div>
        </div>`;
    });
}

function goBackToMenu(){
    window.location.href="menu.html";
}
</script>

</body>
</html>
