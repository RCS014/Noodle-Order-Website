<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านก๋วยเตี๋ยวเรือ ป.ประทีป</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Kanit', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f3ede6;

    /* ลายพื้นหลัง */
    background-image: 
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px),
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px);
    background-size: 80px 80px;
    background-position: 0 0, 40px 40px;
    padding: 20px;
}

.container{
    text-align:center;
    background: rgba(255, 255, 255, 0.9);
    padding: 40px 30px;
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 500px;
    width: 100%;
}

h1{
    font-size:36px;
    font-weight:700;
    color:#ea580c;
    margin-bottom:5px;
}

.subtitle{
    font-size:18px;
    color:#6b7280;
    margin-bottom:30px;
}

/* สร้างตารางจัดเรียงปุ่มโต๊ะ */
.table-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

.btn-table {
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
    color: #ea580c;
    font-size: 20px;
    font-weight: 600;
    padding: 16px;
    border: 2px solid #ea580c;
    border-radius: 16px;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(234, 88, 12, 0.1);
}

.btn-table:hover {
    background: #ea580c;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(234, 88, 12, 0.3);
}

/* ปุ่มสั่งกลับบ้าน (กว้างเต็ม 2 ช่อง) */
.btn-takeaway {
    grid-column: span 2;
    background: #ea580c;
    color: white;
    border: none;
}

.btn-takeaway:hover {
    background: #c2410c;
}

@media (max-width: 400px) {
    h1 { font-size: 28px; }
    .btn-table { font-size: 18px; padding: 12px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>🍜 ป.ประทีป</h1>
    <div class="subtitle">กรุณาเลือกโต๊ะที่ท่านนั่ง</div>
    
    <div class="table-grid">

        <a href="menu.html?table=หน้าเคาน์เตอร์" class="btn-table btn-takeaway">
            สั่งกลับบ้าน (หน้าเคาน์เตอร์)
        </a>
        
        <a href="menu.html?table=1" class="btn-table">โต๊ะ 1</a>
        <a href="menu.html?table=2" class="btn-table">โต๊ะ 2</a>
        <a href="menu.html?table=3" class="btn-table">โต๊ะ 3</a>
        <a href="menu.html?table=4" class="btn-table">โต๊ะ 4</a>
        <a href="menu.html?table=5" class="btn-table">โต๊ะ 5</a>
        
    </div>
</div>

<script src="navbar-script.js" defer></script>

</body>
</html>
