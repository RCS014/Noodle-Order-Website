<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ป. ประทีป ก๋วยเตี๋ยวเรือ</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:'Kanit',sans-serif}
.active{background:#ea580c;color:white;border-color:#ea580c}
</style>
</head>

<body class="bg-gray-50">

<header class="bg-white shadow p-4 flex justify-between items-center">
<h1 class="text-xl font-bold text-orange-600">ป. ประทีป ก๋วยเตี๋ยวเรือ</h1>
<button onclick="openCart()" class="bg-orange-600 text-white px-4 py-2 rounded-lg">
ตะกร้า (<span id="cartCount">0</span>)
</button>
</header>

<div class="max-w-5xl mx-auto p-6 space-y-6">

<!-- เลือกโต๊ะ -->
<div>
<label class="font-semibold">เลือกโต๊ะ</label>
<select id="table" class="w-full border rounded-lg p-2 mt-2">
<option value="1">โต๊ะ 1</option>
<option value="2">โต๊ะ 2</option>
<option value="3">โต๊ะ 3</option>
<option value="4">โต๊ะ 4</option>
<option value="5">โต๊ะ 5</option>
</select>
</div>

<!-- เส้น -->
<div>
<h3 class="font-semibold mb-2">เลือกเส้น</h3>
<div class="grid grid-cols-2 gap-3" id="noodles">
<button class="border rounded-lg p-2" data-name="เส้นเล็ก">เส้นเล็ก</button>
<button class="border rounded-lg p-2" data-name="เส้นหมี่">เส้นหมี่</button>
<button class="border rounded-lg p-2" data-name="เส้นใหญ่">เส้นใหญ่</button>
<button class="border rounded-lg p-2" data-name="บะหมี่">บะหมี่</button>
<button class="border rounded-lg p-2" data-name="วุ้นเส้น">วุ้นเส้น</button>
</div>
</div>

<!-- น้ำ -->
<div>
<h3 class="font-semibold mb-2">เลือกน้ำซุป</h3>
<div class="grid grid-cols-2 gap-3" id="soups">
<button class="border rounded-lg p-2" data-name="น้ำตก">น้ำตก</button>
<button class="border rounded-lg p-2" data-name="น้ำใส">น้ำใส</button>
<button class="border rounded-lg p-2" data-name="แห้ง">แห้ง</button>
<button class="border rounded-lg p-2" data-name="ต้มยำ">ต้มยำ</button>
</div>
</div>

<!-- เผ็ด -->
<div>
<h3 class="font-semibold mb-2">ระดับความเผ็ด</h3>
<select id="spicy" class="w-full border rounded-lg p-2">
<option>เผ็ดน้อย</option>
<option>เผ็ดกลาง</option>
<option>เผ็ดมาก</option>
</select>
</div>

<!-- ขนาด -->
<div>
<h3 class="font-semibold mb-2">ขนาด</h3>
<select id="size" class="w-full border rounded-lg p-2">
<option value="20">ธรรมดา 20 บาท</option>
<option value="35">พิเศษ 35 บาท</option>
<option value="40">ใส่ทุกอย่าง 40 บาท</option>
</select>
</div>

<div>
<h3 class="font-semibold mb-2">จำนวน</h3>
<input type="number" id="qty" value="1" min="1" class="w-full border rounded-lg p-2">
</div>

<button onclick="addNoodle()" class="w-full bg-orange-600 text-white p-3 rounded-xl font-semibold">
เพิ่มก๋วยเตี๋ยว
</button>

</div>

<!-- ================= POPUP CART ================= -->
<div id="cartModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
<div class="bg-white w-11/12 max-w-md rounded-xl p-6 space-y-4">

<h3 class="text-lg font-bold text-orange-600">สรุปรายการสั่งอาหาร</h3>

<div id="cartItems" class="space-y-2 text-sm max-h-60 overflow-y-auto"></div>

<div class="flex justify-between font-bold border-t pt-3">
<span>รวมทั้งหมด</span>
<span id="totalPrice">0 บาท</span>
</div>

<div class="flex gap-2">
<button onclick="closeCart()" class="w-1/2 border rounded-lg p-2">ยกเลิก</button>
<button onclick="confirmOrder()" class="w-1/2 bg-orange-600 text-white rounded-lg p-2">
ยืนยันออเดอร์
</button>
</div>

</div>
</div>

<script>
let selectedNoodle=null;
let selectedSoup=null;
let cart=[];

function singleSelect(groupId,callback){
const group=document.getElementById(groupId);
group.querySelectorAll("button").forEach(btn=>{
btn.onclick=()=>{
group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
callback(btn.dataset.name);
};
});
}
singleSelect("noodles",name=>selectedNoodle=name);
singleSelect("soups",name=>selectedSoup=name);

function addNoodle(){
if(!selectedNoodle||!selectedSoup){
alert("กรุณาเลือกเส้นและน้ำซุป");
return;
}
cart.push({
table:document.getElementById("table").value,
name:selectedNoodle+" "+selectedSoup,
spicy:document.getElementById("spicy").value,
price:parseInt(document.getElementById("size").value),
qty:parseInt(document.getElementById("qty").value)
});
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;
}

function openCart(){
renderCart();
document.getElementById("cartModal").classList.remove("hidden");
}
function closeCart(){
document.getElementById("cartModal").classList.add("hidden");
}

function renderCart(){
const container=document.getElementById("cartItems");
container.innerHTML="";
let total=0;

cart.forEach((item,index)=>{
const sum=item.price*item.qty;
total+=sum;

container.innerHTML+=`
<div class="border p-2 rounded flex justify-between">
<div>
${item.name} (${item.spicy})<br>
จำนวน: ${item.qty}
</div>
<div>
${sum} บาท
<button onclick="removeItem(${index})" class="text-red-500 ml-2">ลบ</button>
</div>
</div>
`;
});

document.getElementById("totalPrice").innerText=total+" บาท";
}

function removeItem(index){
cart.splice(index,1);
renderCart();
updateCart();
}

function confirmOrder(){
localStorage.setItem("orderData",JSON.stringify(cart));
window.location.href="success.html";
}
</script>

</body>
</html>
