<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ร้านก๋วยเตี๋ยวเรือ ป.ประทีป</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Kanit', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background-color:#f3ede6;

    /* ลายพื้นหลัง */
    background-image: 
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px),
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px);
    background-size: 80px 80px;
    background-position: 0 0, 40px 40px;
}

.container{
    text-align:center;
}

h1{
    font-size:48px;
    font-weight:700;
    color:#1f2937;
    margin-bottom:10px;
}

.subtitle{
    font-size:22px;
    color:#374151;
    margin-bottom:40px;
}

.btn{
    background:#f97316;
    color:white;
    font-size:20px;
    font-weight:600;
    padding:16px 50px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.btn:hover{
    background:#ea580c;
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:#f97316;
    color:white;
    font-size:20px;
    font-weight:600;
    padding:16px 50px;
    border-radius:12px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    transition:0.3s;
}

.btn:hover{
    background:#ea580c;
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}
</style>
</head>

<body>

<div class="container">
    <h1>ร้านก๋วยเตี๋ยวเรือ ป.ประทีป</h1>
    <div class="subtitle">ยินดีต้อนรับ</div>
    <a href="menu.html" class="btn">เข้าสู่ร้านอาหาร</a>
</div>

</body>
</html>
