<!DOCTYPE html>
<html class="light" lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>คิวสั่งอาหาร</title>
    <script src="navbar-script.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "Sarabun", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    
    <style>
        main, aside {
            font-family:'Kanit'
        }
        .noodle-pattern {
            background-color: #f8f6f6;
            background-image: radial-gradient(#ec5b13 0.5px, transparent 0.5px), radial-gradient(#ec5b13 0.5px, #f8f6f6 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.05;
        }
        .dark .noodle-pattern {
            background-color: #221610;
            background-image: radial-gradient(#ec5b13 0.5px, transparent 0.5px), radial-gradient(#ec5b13 0.5px, #221610 0.5px);
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-200">
    <div class="flex h-screen overflow-hidden relative">
        
        <div class="absolute inset-0 noodle-pattern pointer-events-none"></div>
        
        <aside id="sidebar" class="w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 shadow-2xl md:shadow-none">
            
            <button id="close-sidebar-btn" class="absolute top-4 left-5 md:hidden p-2 text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>

            <div class="p-8 flex flex-col items-center text-center mt-4 md:mt-0">
                <div class="w-24 h-24 rounded-full bg-primary/10 flex items-center justify-center p-2 mb-4 ring-4 ring-primary/5">
                    <div class="w-full h-full rounded-full bg-cover bg-center shadow-inner" data-alt="Logo for boat noodle shop P Prateep" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBQ5TQYrIKsPSEfUMXYfYUcd0a-MIaV2R7GVudVQAQAelUyzxZPYY_5yl0CGPhtiRM480QSGfTiaSeQ1c3omiDjc67jZL7aw7semk6SZKOX1HbELLGjZSOIT96x2zvELMgNLi2VEh7aAc4DMI1QwsHJGslkyV-oQ89r5EFkXcJpsUCaMY4tTWPjInEk7l346caUyI_qpdJ9m5Mm04BsXbfi2ZkPssFwT9QLyN_DXZWdShw6kbwaZ-Nvo6SBBWA1E0bDOQepnghQQ_5U');"></div>
                </div>
                <h2 class="text-xl font-black text-slate-900 dark:text-white">ป. ประทีป</h2>
                <p class="text-primary font-bold text-sm tracking-wide">ก๋วยเตี๋ยวเรือ อยุธยา</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl bg-primary text-white shadow-lg shadow-primary/25 transition-all" href="#">
                    <span class="material-symbols-outlined filled">list_alt</span>
                    <span class="font-bold">ออเดอร์ (Orders)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all group" href="order_manage.html">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">restaurant_menu</span>
                    <span class="font-bold group-hover:text-slate-900 dark:group-hover:text-white transition-colors">จัดการเมนู (Manage Menu)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all group" href="order_history.html">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">history</span>
                    <span class="font-bold group-hover:text-slate-900 dark:group-hover:text-white transition-colors">ประวัติการขาย (History)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all group" href="#">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">settings</span>
                    <span class="font-bold group-hover:text-slate-900 dark:group-hover:text-white transition-colors">การตั้งค่า (Settings)</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-slate-100 dark:border-slate-800 mt-auto">
                <div class="p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 flex items-center gap-4 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-bold truncate">พนักงาน A</p>
                        <p class="text-[10px] text-slate-400 font-medium">กะกลางวัน</p>
                    </div>
                </div>
                <button class="w-full flex items-center justify-center gap-3 py-4 text-rose-500 font-bold hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-2xl transition-all">
                    <span class="material-symbols-outlined">logout</span>
                    <span>ออกจากระบบ (Sign Out)</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto relative z-10 p-6 lg:p-10">
            
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                <div class="flex items-start gap-4 w-full md:w-auto">
                    <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center p-2 mt-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm hover:bg-slate-50 transition-colors">
                        <span class="material-symbols-outlined text-2xl text-slate-700 dark:text-slate-200">menu</span>
                    </button>
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 dark:text-white tracking-tight">ออเดอร์ที่เข้ามา</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-1 font-medium flex items-center gap-2">
                            <span class="relative flex h-3 w-3">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
                            </span>
                            จัดการคำสั่งซื้อแบบเรียลไทม์
                        </p>
                    </div>
                </div>
                
            </header>
            <div id="orderContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">

            </div>
        </main>

        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

    </div>

    <script src="js/order_list.js"></script><!-- ย้าย script ไว้ในโฟลเดอร์ js -->
</body>
</html>
