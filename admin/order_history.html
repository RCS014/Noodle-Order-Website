<!DOCTYPE html>
<html class="light" lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ประวัติการสั่งอาหาร</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ec5b13", "background-light": "#f8f6f6", "background-dark": "#221610" }, fontFamily: { "display": ["Public Sans", "Sarabun", "sans-serif"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }
    </script>
    <style>
        main, aside { font-family: 'Kanit'; }
        .noodle-pattern { background-color: #f8f6f6; background-image: radial-gradient(#ec5b13 0.5px, transparent 0.5px), radial-gradient(#ec5b13 0.5px, #f8f6f6 0.5px); background-size: 20px 20px; background-position: 0 0, 10px 10px; opacity: 0.05; }
        body{
font-family:'Kanit',sans-serif
}
body{

    background-image: 
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px),
        radial-gradient(circle at center, #e8d8c3 3px, transparent 4px);
    background-size: 80px 80px;
    background-position: 0 0, 40px 40px;
}


    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-200">
    <div class="flex h-screen overflow-hidden relative">
        <div class="absolute inset-0 noodle-pattern pointer-events-none"></div>
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

        <aside id="sidebar" class="w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 shadow-2xl md:shadow-none">
            <button id="close-sidebar-btn" class="absolute top-4 left-5 md:hidden p-2 text-slate-400 hover:text-slate-700 transition-colors"><span class="material-symbols-outlined">close</span></button>
            <div class="p-8 flex flex-col items-center text-center mt-4 md:mt-0">
                <div class="w-24 h-24 rounded-full bg-primary/10 flex items-center justify-center p-2 mb-4 ring-4 ring-primary/5">
                    <div class="w-full h-full rounded-full bg-cover bg-center shadow-inner bg-[url('/img/logo.jpg')]" data-alt="Logo for boat noodle shop P Prateep"></div>
                </div>
                <h2 class="text-xl font-black text-slate-900 dark:text-white">ป. ประทีป</h2>
                <p class="text-primary font-bold text-sm tracking-wide">ก๋วยเตี๋ยวเรือ อยุธยา</p>
            </div>
            <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all group" href="order_list.html">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">list_alt</span><span class="font-bold group-hover:text-slate-900 transition-colors">ออเดอร์ (Orders)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all group" href="order_manage.html">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">restaurant_menu</span><span class="font-bold group-hover:text-slate-900 transition-colors">จัดการเมนู (Manage Menu)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl bg-primary text-white shadow-lg shadow-primary/25 transition-all" href="#">
                    <span class="material-symbols-outlined filled">history</span><span class="font-bold">ประวัติการขาย (History)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all group" href="../menu.html">
                    <span class="material-symbols-outlined filled">simulation</span>
                    <span class="font-bold">ทดสอบหน้าลูกค้า (Customer Test)</span>
                </a>
            </nav>

        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto relative z-10 p-6 lg:p-10 pb-20">
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                <div class="flex items-start gap-4 w-full md:w-auto">
                    <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center p-2 mt-1 bg-white border rounded-xl shadow-sm"><span class="material-symbols-outlined text-2xl text-slate-700">menu</span></button>
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 tracking-tight">ประวัติการสั่ง</h1>
                        <p class="text-slate-500 mt-1 font-medium flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-lg">history</span>
                            <span>แสดงประวัติการสั่งย้อนหลัง</span>
                        </p>
                        <button onclick="clearHistory()" class="mt-4 bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-md transition-transform active:scale-95 w-fit">
                        <span class="material-symbols-outlined">delete_sweep</span> 
                            ล้างประวัติการสั่ง
                        </button>
                    </div>
                </div>
            </header>

            <div class="w-full overflow-x-auto pb-4">
                <div class="min-w-[900px]">
                    <div class="bg-white rounded-xl shadow-sm mb-4 p-4 px-8 grid grid-cols-12 gap-4 text-slate-500 font-medium text-center items-center">
                        <div class="col-span-3 text-left">เวลาสั่ง</div>
                        <div class="col-span-1">โต๊ะที่</div>
                        <div class="col-span-4">เมนู</div>
                        <div class="col-span-2">ราคารวม</div>
                        <div class="col-span-2">สถานะ</div>
                    </div>
                    
                    <div class="space-y-4" id="historyContainer"></div>
                </div>
            </div>

            <div id="pagination-container" class="flex justify-center items-center gap-3 mt-8"></div>
        </main>
    </div>
    <script src="js\order_history.js"></script> <!-- ย้าย script ไว้ในโฟลเดอร์ js -->

    <script src="navbar-script.js" defer></script>
    
</body>
</html>
