<!DOCTYPE html>
<html class="light" lang="th">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ประวัติการสั่งอาหาร</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#ec5b13", "background-light": "#f8f6f6", "background-dark": "#221610" }, fontFamily: { "display": ["Public Sans", "Sarabun", "sans-serif"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }
    </script>
    <style>
        main, aside { font-family: 'Kanit'; }
        .noodle-pattern { background-color: #f8f6f6; background-image: radial-gradient(#ec5b13 0.5px, transparent 0.5px), radial-gradient(#ec5b13 0.5px, #f8f6f6 0.5px); background-size: 20px 20px; background-position: 0 0, 10px 10px; opacity: 0.05; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display transition-colors duration-200">
    <div class="flex h-screen overflow-hidden relative">
        <div class="absolute inset-0 noodle-pattern pointer-events-none"></div>
        <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>

        <aside id="sidebar" class="w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col fixed inset-y-0 left-0 z-50 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 shadow-2xl md:shadow-none">
            <button id="close-sidebar-btn" class="absolute top-4 left-5 md:hidden p-2 text-slate-400 hover:text-slate-700 transition-colors"><span class="material-symbols-outlined">close</span></button>
            <div class="p-8 flex flex-col items-center text-center mt-4 md:mt-0">
                <div class="w-24 h-24 rounded-full bg-primary/10 flex items-center justify-center p-2 mb-4 ring-4 ring-primary/5">
                    <div class="w-full h-full rounded-full bg-cover bg-center shadow-inner" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBQ5TQYrIKsPSEfUMXYfYUcd0a-MIaV2R7GVudVQAQAelUyzxZPYY_5yl0CGPhtiRM480QSGfTiaSeQ1c3omiDjc67jZL7aw7semk6SZKOX1HbELLGjZSOIT96x2zvELMgNLi2VEh7aAc4DMI1QwsHJGslkyV-oQ89r5EFkXcJpsUCaMY4tTWPjInEk7l346caUyI_qpdJ9m5Mm04BsXbfi2ZkPssFwT9QLyN_DXZWdShw6kbwaZ-Nvo6SBBWA1E0bDOQepnghQQ_5U');"></div>
                </div>
                <h2 class="text-xl font-black text-slate-900 dark:text-white">ป. ประทีป</h2>
                <p class="text-primary font-bold text-sm tracking-wide">ก๋วยเตี๋ยวเรือ อยุธยา</p>
            </div>
            <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all group" href="order_list.html">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">list_alt</span><span class="font-bold group-hover:text-slate-900 transition-colors">ออเดอร์ (Orders)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all group" href="order_manage.html">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">restaurant_menu</span><span class="font-bold group-hover:text-slate-900 transition-colors">จัดการเมนู (Manage Menu)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl bg-primary text-white shadow-lg shadow-primary/25 transition-all" href="#">
                    <span class="material-symbols-outlined filled">history</span><span class="font-bold">ประวัติการขาย (History)</span>
                </a>
                <a class="flex items-center gap-4 px-4 py-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all group" href="#">
                    <span class="material-symbols-outlined group-hover:text-primary transition-colors">settings</span><span class="font-bold group-hover:text-slate-900 transition-colors">การตั้งค่า (Settings)</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-100 mt-auto">
                <div class="p-4 rounded-2xl bg-slate-50 flex items-center gap-4 mb-4">
                    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center text-primary"><span class="material-symbols-outlined">person</span></div>
                    <div class="flex-1 min-w-0"><p class="text-sm font-bold truncate">พนักงาน A</p><p class="text-[10px] text-slate-400 font-medium">กะกลางวัน</p></div>
                </div>
                <button class="w-full flex items-center justify-center gap-3 py-4 text-rose-500 font-bold hover:bg-rose-50 rounded-2xl transition-all"><span class="material-symbols-outlined">logout</span><span>ออกจากระบบ (Sign Out)</span></button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto relative z-10 p-6 lg:p-10 pb-20">
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                <div class="flex items-start gap-4 w-full md:w-auto">
                    <button id="mobile-menu-btn" class="md:hidden flex items-center justify-center p-2 mt-1 bg-white border rounded-xl shadow-sm"><span class="material-symbols-outlined text-2xl text-slate-700">menu</span></button>
                    <div>
                        <h1 class="text-4xl font-black text-slate-900 tracking-tight">ประวัติการสั่ง</h1>
                        <p class="text-slate-500 mt-1 font-medium flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-lg">history</span>
                            <span id="time-label">แสดงประวัติย้อนหลัง 1 ชั่วโมง</span>
                        </p>
                    </div>
                </div>
            </header>

            <div class="w-full overflow-x-auto pb-4">
                <div class="min-w-[900px]">
                    <div class="bg-white rounded-xl shadow-sm mb-4 p-4 px-8 grid grid-cols-12 gap-4 text-slate-500 font-medium text-center items-center">
                        <div class="col-span-3 text-left">เวลาสั่ง</div>
                        <div class="col-span-1">โต๊ะที่</div>
                        <div class="col-span-4">เมนู</div>
                        <div class="col-span-2">ราคารวม</div>
                        <div class="col-span-2">สถานะ</div>
                    </div>
                    
                    <div class="space-y-4" id="historyContainer"></div>
                </div>
            </div>

            <div id="pagination-container" class="flex justify-center items-center gap-3 mt-8"></div>
        </main>
    </div>

    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        function toggleSidebar() { sidebar.classList.toggle('-translate-x-full'); overlay.classList.toggle('hidden'); }
        mobileMenuBtn.addEventListener('click', toggleSidebar); closeSidebarBtn.addEventListener('click', toggleSidebar); overlay.addEventListener('click', toggleSidebar);

        // ==========================================
        // ระบบประวัติ ลบอัตโนมัติ 1 ชม. และ แบ่งหน้า
        // ==========================================

        const itemsPerPage = 10; 
        let currentPage = 1;
        let allGroupedOrders = [];

        function renderHistory() {
            let orders = JSON.parse(localStorage.getItem("orderHistory")) || [];
            const ONE_HOUR = 60 * 60 * 1000;
            const now = Date.now();

            // 1. คัดกรองเก็บเฉพาะข้อมูลที่อายุ "ไม่เกิน 1 ชั่วโมง"
            let validOrders = orders.filter(o => (now - o.queue) <= ONE_HOUR);
            
            // ถ้ามีการลบข้อมูลเก่าทิ้งไป ให้เซฟทับ LocalStorage ใหม่ทันที
            if(validOrders.length !== orders.length) {
                localStorage.setItem("orderHistory", JSON.stringify(validOrders));
            }

            // 2. อัปเดตป้ายกำกับเวลาด้านบน
            let oneHourAgo = new Date(now - ONE_HOUR);
            let timeText = `แสดงประวัติย้อนหลัง 1 ชั่วโมง (ตั้งแต่เวลา ${String(oneHourAgo.getHours()).padStart(2,'0')}:${String(oneHourAgo.getMinutes()).padStart(2,'0')} น.)`;
            document.getElementById('time-label').innerText = timeText;

            // 3. จัดกลุ่มออเดอร์ตามบิล (เวลาที่สั่งพร้อมกัน)
            let grouped = {};
            validOrders.forEach(o => {
                let key = o.queue;
                if (!grouped[key]) {
                    grouped[key] = { time: o.queue, table: o.table, status: "เสิร์ฟแล้ว", total: 0, items: [] };
                }
                grouped[key].items.push(o);
                grouped[key].total += (o.price * o.qty);
                
                // ถ้ายกเลิกคิว ให้เป็นยกเลิก, ถ้ายังทำอยู่ ให้เป็นยังไม่ได้เสิร์ฟ
                if (o.status === "ยกเลิก") grouped[key].status = "ยกเลิก";
                else if (o.status === "กำลังทำ" && grouped[key].status !== "ยกเลิก") grouped[key].status = "ยังไม่ได้เสิร์ฟ";
            });

            // เรียงบิลจาก ใหม่สุด ไป เก่าสุด
            allGroupedOrders = Object.values(grouped).sort((a, b) => b.time - a.time);

            // โชว์ข้อมูลหน้าแรก และสร้างปุ่ม
            displayItems(currentPage);
            setupPagination();
        }

        function displayItems(page) {
            let container = document.getElementById("historyContainer");
            container.innerHTML = "";

            if (allGroupedOrders.length === 0) {
                container.innerHTML = "<p class='text-center py-8 text-slate-500'>ไม่มีประวัติการสั่งอาหารใน 1 ชั่วโมงที่ผ่านมา</p>";
                return;
            }

            const start = (page - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const itemsToShow = allGroupedOrders.slice(start, end);

            itemsToShow.forEach(order => {
                let dateObj = new Date(order.time);
                let timeString = dateObj.toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
                
                let itemsHTML = order.items.map(i => `
                    <div class="flex gap-4 border-b border-slate-100 pb-1 mb-1 last:border-0">
                        <span class="font-black text-primary w-6 text-right">x${i.qty}</span>
                        <span class="text-sm text-slate-600">${i.name} ${i.spicy ? '(🌶 '+i.spicy+')' : ''}</span>
                    </div>
                `).join('');

                let statusColor = "text-emerald-500"; // เสิร์ฟแล้ว (สีเขียว)
                if (order.status === "ยังไม่ได้เสิร์ฟ") statusColor = "text-amber-500"; // สีส้ม
                if (order.status === "ยกเลิก") statusColor = "text-rose-500"; // สีแดง

                container.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm p-6 px-8 grid grid-cols-12 gap-4 items-center text-center border">
                    <div class="col-span-3 text-left text-sm text-slate-600">${timeString}</div>
                    <div class="col-span-1 font-bold text-lg">${order.table}</div>
                    <div class="col-span-4 flex justify-center">
                        <div class="flex flex-col w-full max-w-[250px] bg-slate-50 p-3 rounded-lg text-left">
                            ${itemsHTML}
                        </div>
                    </div>
                    <div class="col-span-2 font-bold">${order.total}.-</div>
                    <div class="col-span-2 font-bold ${statusColor}">${order.status}</div>
                </div>`;
            });
        }

        function setupPagination() {
            const paginationContainer = document.getElementById('pagination-container');
            const pageCount = Math.ceil(allGroupedOrders.length / itemsPerPage);
            paginationContainer.innerHTML = '';

            if (pageCount <= 1) return; // ไม่สร้างปุ่มถ้ามีหน้าเดียว

            for (let i = 1; i <= pageCount; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = "w-12 h-12 flex items-center justify-center text-lg rounded-xl transition-all active:scale-95 ";

                if (i === currentPage) {
                    btn.className += "bg-primary text-white font-black shadow-lg shadow-primary/30";
                } else {
                    btn.className += "bg-white text-slate-700 font-bold shadow-sm hover:bg-slate-50 border border-slate-200";
                }

                btn.addEventListener('click', function() {
                    currentPage = i;
                    displayItems(currentPage);
                    setupPagination(); // วาดปุ่มใหม่เพื่อเปลี่ยนสี
                });
                paginationContainer.appendChild(btn);
            }
        }

        // รันฟังก์ชันตอนโหลดหน้าเว็บ
        window.onload = function() {
            renderHistory();
            // เช็คและลบข้อมูลอัตโนมัติทุกๆ 1 นาที (60000 ms)
            setInterval(renderHistory, 60000); 
        };
    </script>
</body>
</html>
